<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<title>Login | MangaCanvas</title>

<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ghost-border {
            border: 1px solid rgba(230, 190, 179, 0.15);
        }
        .sunset-gradient {
            background: linear-gradient(135deg, #ac2e00 0%, #d73b00 100%);
        }
    </style>
</head>
<body class="bg-surface-container-low text-on-surface min-h-screen flex flex-col justify-center items-center p-6">
<!-- Supressing Navigation Shell for Login - Logic per "The Destination Rule" -->
<!-- Main Content Canvas -->
<main class="w-full max-w-md">
<!-- Brand Identity Section -->
<div class="text-center mb-12">
<h1 class="text-3xl font-black tracking-tighter text-on-surface mb-2">MangaCanvas</h1>
<p class="text-on-secondary-fixed-variant text-sm tracking-wide font-medium">EDITORIAL ASSET MANAGEMENT</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-10 shadow-[0_40px_40px_rgba(27,28,28,0.04)]">
<div class="mb-8">
<h2 class="text-2xl font-bold tracking-tight text-on-surface">Welcome back</h2>
<p class="text-secondary text-sm mt-1">Access your kinetic gallery projects</p>
</div>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-xs font-semibold uppercase tracking-widest text-on-secondary-fixed-variant" for="email">Email Address</label>
<div class="relative group">
<input class="w-full h-12 px-4 bg-surface-container-low border-none rounded-lg text-on-surface placeholder:text-secondary-fixed-dim focus:ring-1 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" id="email" name="email" placeholder="editor@mangacanvas.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-xs font-semibold uppercase tracking-widest text-on-secondary-fixed-variant" for="password">Password</label>
<a class="text-primary text-xs font-medium hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative group">
<input class="w-full h-12 px-4 bg-surface-container-low border-none rounded-lg text-on-surface placeholder:text-secondary-fixed-dim focus:ring-1 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full h-12 sunset-gradient text-on-primary font-bold rounded-full text-sm tracking-tight active:scale-95 transition-transform shadow-lg shadow-primary/10 mt-4" type="submit">
                    Sign In
                </button>
</form>
<!-- Social/Alternative Login (Minimalist) -->
<div class="mt-8 pt-8 ghost-border border-t border-0">
<p class="text-center text-on-secondary-fixed-variant text-sm">
                    Don't have an account? 
                    <a class="text-primary font-bold ml-1 hover:underline" href="#">Create an account</a>
</p>
</div>
</div>
<!-- Visual Anchor (Asymmetric Decoration) -->
<div class="mt-12 flex justify-center items-center gap-4 opacity-40 grayscale hover:grayscale-0 transition-all duration-500">
<div class="w-24 h-[1px] bg-outline-variant"></div>
<span class="material-symbols-outlined text-secondary" data-icon="auto_awesome">auto_awesome</span>
<div class="w-24 h-[1px] bg-outline-variant"></div>
</div>
</main>
<!-- Footer - Mapping from Shared Components JSON -->
<footer class="fixed bottom-0 w-full py-12 px-8">
<div class="flex flex-col md:flex-row justify-between items-center max-w-7xl mx-auto">
<div class="flex flex-col items-center md:items-start mb-6 md:mb-0">
<span class="font-['Inter'] text-xs text-[#474747] opacity-80">© 2024 Kinetic Gallery. All rights reserved.</span>
</div>
<div class="flex gap-8">
<a class="font-['Inter'] text-xs text-[#5f5e5e] hover:text-[#ac2e00] transition-colors" href="#">Privacy Policy</a>
<a class="font-['Inter'] text-xs text-[#5f5e5e] hover:text-[#ac2e00] transition-colors" href="#">Terms of Service</a>
<a class="font-['Inter'] text-xs text-[#5f5e5e] hover:text-[#ac2e00] transition-colors" href="#">Contact</a>
</div>
</div>
</footer>
<!-- Decorative Background Asset per Design System -->
<div class="fixed top-0 right-0 -z-10 w-1/3 h-full opacity-[0.03] pointer-events-none">
<img class="object-cover w-full h-full" data-alt="abstract minimalist line art of manga panels and geometric shapes in charcoal gray on soft white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCGo-QVLSCB0AqzGDVmwmIHj2Drc46Rhp7SbwQy_xjmfqffUl-RT1J-NRM11BdTjUIl5Tk2rqSXbghHeyCFKrfZtbRe0v4gxHgfm6VBViLq0r2g6jUFH1gdLRa4-NdVZLd_9pdTrNBAkpXKtLmwOzIeyCioOfOFPm702tkARfbCOLgdihmm5hHy0YgwA9IApDbT3jQ9A5-LOc4juXgTZW2U_P63yyx1mfOnyjhrtdad9To_vaPK0rO7D27zEkfhY5P-5jn5VfRLyA"/>
</div>
